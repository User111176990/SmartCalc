<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Herramientas Online</title>

<link rel="stylesheet" href="styles.css">
</head>

<body>
<div class="container">
  <button class="mode-btn" onclick="toggleMode()">Modo claro / oscuro</button>

  <div id="calculatorTool" class="tool">
    <h2>Calculadora</h2>
    <input class="calc-display" id="calcDisplay" disabled aria-label="Pantalla de calculadora">

    <div class="calc-scientific">
      <button onclick="applySquareRoot()">√x</button>
      <button onclick="applyPower2()">x²</button>
      <button onclick="applyReciprocal()">1/x</button>
      <button onclick="toggleSign()">±</button>
    </div>

    <div class="calc-grid">
      <button onclick="press('7')">7</button>
      <button onclick="press('8')">8</button>
      <button onclick="press('9')">9</button>
      <button onclick="press('/')">÷</button>

      <button onclick="press('4')">4</button>
      <button onclick="press('5')">5</button>
      <button onclick="press('6')">6</button>
      <button onclick="press('*')">×</button>

      <button onclick="press('1')">1</button>
      <button onclick="press('2')">2</button>
      <button onclick="press('3')">3</button>
      <button onclick="press('-')">−</button>

      <button onclick="press('0')">0</button>
      <button onclick="press('.')">.</button>
      <button onclick="calculate()">=</button>
      <button onclick="press('+')">+</button>

      <button onclick="press('%')">%</button>
      <button onclick="press('(')">(</button>
      <button onclick="press(')')">)</button>
      <button onclick="clearCalc()">C</button>
    </div>

    <div class="calc-memory">
      <button class="subtle-btn" onclick="insertConstant('PI')">π</button>
      <button class="subtle-btn" onclick="insertConstant('E')">e</button>
      <button class="subtle-btn" onclick="insertLastAnswer()">Ans</button>
      <button class="subtle-btn" onclick="deleteLast()">DEL</button>
      <button class="subtle-btn" onclick="memoryAdd()">M+</button>
      <button class="subtle-btn" onclick="memorySubtract()">M-</button>
      <button class="subtle-btn" onclick="memoryRecall()">MR</button>
      <button class="subtle-btn" onclick="memoryClear()">MC</button>
    </div>

    <div class="section">
      <strong>Memoria:</strong> <span id="memoryValue">0</span> · <strong>Último resultado:</strong> <span id="lastAnswer">0</span>
    </div>

    <div class="section">
      <strong>Historial de operaciones</strong>
      <button class="warning-btn" style="float:right" onclick="clearCalcHistory()">Limpiar</button>
      <div style="clear:both"></div>
      <div class="history" id="calcHistory"></div>
      <div id="shortcutHint">
        Atajos: Enter (=), Backspace (DEL), Esc/Ctrl+L (limpiar), s (√), q (x²), i (1/x), n (±), p (π), e (e), a (Ans).
      </div>
    </div>

    <button class="switch-btn" onclick="showPassword()">Ir al generador de contraseñas</button>
  </div>

  <div id="passwordTool" class="password tool">
    <h2>Generador de Contraseñas</h2>
    <div id="password">Pulsa generar</div>

    <button onclick="generatePassword()">Generar</button>
    <button onclick="copyPassword()">Copiar</button>

    <div class="options">
      <p>Longitud: <span id="lengthValue">16</span></p>
      <input type="range" min="6" max="64" value="16" id="length">

      <label><input type="checkbox" id="upper" checked> Mayúsculas</label><br>
      <label><input type="checkbox" id="lower" checked> Minúsculas</label><br>
      <label><input type="checkbox" id="numbers" checked> Números</label><br>
      <label><input type="checkbox" id="symbols"> Símbolos</label><br>
      <label><input type="checkbox" id="excludeSimilar"> Excluir caracteres ambiguos (O,0,l,1,I)</label>
    </div>

    <div class="strength"><div class="strength-bar" id="strengthBar"></div></div>
    <div id="strengthText">Fortaleza: -</div>
    <div id="passwordTip"></div>

    <div class="section">
      <strong>Historial generado</strong>
      <button class="warning-btn" style="float:right" onclick="clearPasswordHistory()">Limpiar</button>
      <div style="clear:both"></div>
      <div class="history" id="history"></div>
    </div>

    <button class="switch-btn" onclick="showCalculator()">Volver a calculadora</button>
  </div>
</div>

<div id="toast" class="toast" role="status" aria-live="polite"></div>

<script src="app.js"></script>

</body>
</html>
